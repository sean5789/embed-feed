<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Flux EmbedSocial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#fff;
  font-family:sans-serif;
  overflow:hidden;
}

#viewport {
  width:100%;
  height:100vh;
  overflow:hidden;
}

#stage {
  transform-origin: top left;
  will-change: transform;
  transform: scale(0.75);
}

#track {
  display:flex;
  gap:18px;
  width:max-content;
  transform:translate3d(0,0,0);
}

/* 🔥 PLUS GROS DIRECT */
.card {
  flex:0 0 auto;
  width:260px;
  height:472px;
  border-radius:16px;
  overflow:hidden;
  background:#fff;
}

/* 🔥 VIDÉO À LA BONNE TAILLE DIRECT */
.video-wrapper {
  width:100%;
  height:462px;
  overflow:hidden;
  border-radius:16px;
}

video, img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.sound-btn {
  position:absolute;
  bottom:10px;
  right:6px;
  width:26px;
  height:26px;
  border-radius:50%;
  background:rgba(0,0,0,.6);
}

.info {
  height:10px;
}

.show-more-card {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:yellow;
  height:100%;
}
</style>
</head>

<body>

<div id="viewport">
  <div id="stage">
    <div id="track">
      
      <div class="card">
        <div class="video-wrapper">
          <video
                   src="https://embedsocial.com/admin/cdncache/feed-media/18074/18074297701860940/video.mp4"
                   autoplay
                   muted
                   loop
                   playsinline
                   webkit-playsinline
                   preload="auto"
                   disablepictureinpicture
                 ></video>
                 <button class="sound-btn" title="Ouvrir le calendrier"></button>
        </div>
        <div class="info"></div>
      </div>
    

      <div class="card">
        <div class="video-wrapper">
          <video
                   src="https://embedsocial.com/admin/mediacache/feed-media/17927/17927366448086139/video.mp4"
                   autoplay
                   muted
                   loop
                   playsinline
                   webkit-playsinline
                   preload="auto"
                   disablepictureinpicture
                 ></video>
                 <button class="sound-btn" title="Ouvrir le calendrier"></button>
        </div>
        <div class="info"></div>
      </div>
    

      <div class="card">
        <div class="video-wrapper">
          <video
                   src="https://embedsocial.com/admin/mediacache/feed-media/17884/17884932837315561/video.mp4"
                   autoplay
                   muted
                   loop
                   playsinline
                   webkit-playsinline
                   preload="auto"
                   disablepictureinpicture
                 ></video>
                 <button class="sound-btn" title="Ouvrir le calendrier"></button>
        </div>
        <div class="info"></div>
      </div>
    

      <div class="card">
        <div class="video-wrapper">
          <video
                   src="https://embedsocial.com/admin/mediacache/feed-media/18071/18071734282816612/video.mp4"
                   autoplay
                   muted
                   loop
                   playsinline
                   webkit-playsinline
                   preload="auto"
                   disablepictureinpicture
                 ></video>
                 <button class="sound-btn" title="Ouvrir le calendrier"></button>
        </div>
        <div class="info"></div>
      </div>
    

      <div class="card">
        <div class="video-wrapper">
          <video
                   src="https://embedsocial.com/admin/mediacache/feed-media/18033/18033437192457106/video.mp4"
                   autoplay
                   muted
                   loop
                   playsinline
                   webkit-playsinline
                   preload="auto"
                   disablepictureinpicture
                 ></video>
                 <button class="sound-btn" title="Ouvrir le calendrier"></button>
        </div>
        <div class="info"></div>
      </div>
    
      <div class="card" id="show-more-btn">
        <div class="show-more-card" onclick="showMore()">➕</div>
      </div>
    </div>
  </div>
</div>

<script>
const CAL_URL = "https://www.theushuaiaexperience.com/en/club/calendar";
const BATCH_SIZE = 5;
const remainingPosts = [{"video":"https://embedsocial.com/admin/mediacache/feed-media/17907/17907779979187833/video.mp4","image":{"width":1080,"height":1080,"source":"https://embedsocial.com/admin/mediacache/feed-media/17907/17907779979187833/image_0.jpeg","source_webp":"https://embedsocial.com/admin/mediacache/feed-media/17907/17907779979187833/image_0.webp","type":"image","altText":null}},{"video":"https://embedsocial.com/admin/mediacache/feed-media/18076/18076544770932354/video.mp4","image":{"width":1080,"height":1080,"source":"https://embedsocial.com/admin/mediacache/feed-media/18076/18076544770932354/image_0.jpeg","source_webp":"https://embedsocial.com/admin/mediacache/feed-media/18076/18076544770932354/image_0.webp","type":"image","altText":null}},{"video":"https://embedsocial.com/admin/mediacache/feed-media/18072/18072210499989992/video.mp4","image":{"width":1080,"height":1080,"source":"https://embedsocial.com/admin/mediacache/feed-media/18072/18072210499989992/image_0.jpeg","source_webp":"https://embedsocial.com/admin/mediacache/feed-media/18072/18072210499989992/image_0.webp","type":"image","altText":null}},{"video":"https://embedsocial.com/admin/mediacache/feed-media/18066/18066965276282499/video.mp4","image":{"width":1080,"height":1080,"source":"https://embedsocial.com/admin/mediacache/feed-media/18066/18066965276282499/image_0.jpeg","source_webp":"https://embedsocial.com/admin/mediacache/feed-media/18066/18066965276282499/image_0.webp","type":"image","altText":null}},{"video":"https://embedsocial.com/admin/mediacache/feed-media/18058/18058193099582621/video.mp4","image":{"width":1080,"height":1080,"source":"https://embedsocial.com/admin/mediacache/feed-media/18058/18058193099582621/image_0.jpeg","source_webp":"https://embedsocial.com/admin/mediacache/feed-media/18058/18058193099582621/image_0.webp","type":"image","altText":null}},{"video":"https://embedsocial.com/admin/mediacache/feed-media/18276/18276660490284988/video.mp4","image":{"width":1080,"height":1080,"source":"https://embedsocial.com/admin/mediacache/feed-media/18276/18276660490284988/image_0.jpeg","source_webp":null,"type":"image","altText":null}}];

let currentIndex = 0;
let stepPx = 278;

function goTo(i){
  currentIndex = i;
  document.getElementById('track').style.transform =
    'translate3d(' + (-i * stepPx) + 'px,0,0)';
}

function showMore(){
  const btn = document.getElementById("show-more-btn");
  remainingPosts.splice(0,BATCH_SIZE).forEach(p=>{
    btn.insertAdjacentHTML("beforebegin", createCard(p));
  });
}

function createCard(post){
  return `
    <div class="card">
      <div class="video-wrapper">
        ${post.video
          ? '<video src="'+post.video+'" autoplay muted loop playsinline></video>'
          : '<img src="'+post.image+'" />'}
      </div>
      <div class="info"></div>
    </div>
  `;
}
</script>

</body>
</html>
